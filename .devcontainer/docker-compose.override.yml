# Devcontainer overlay: build from source, workspace mount, dev server port.
# Loaded by devcontainer.json alongside ../docker-compose.yml.
# Only POSTGRES_PASSWORD comes from ../.env; IMAGE is overridden below.
services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    image: tientje-ketama:dev
    volumes:
      - .:/workspace:cached
      - node-modules:/workspace/node_modules
    environment:
      UPLOADS_DIR: /workspace/uploads
      PORT: "5173"
    ports:
      - "127.0.0.1:5173:5173"
    labels: []

# Local traefik network (non-external) prevents the real Traefik from picking up dev containers.
networks:
  traefik:
    name: tientje-ketama-traefik
    driver: bridge
    external: false

volumes:
  node-modules:
