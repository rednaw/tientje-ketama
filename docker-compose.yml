services:
  app:
    image: ${IMAGE:-}
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/tientje_ketama
      UPLOADS_DIR: /app/uploads
      PUBLIC_SIMPLE_ANALYTICS_DOMAIN: ""
      PORT: "3000"
      BODY_SIZE_LIMIT: "20M"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tientje_ketama
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

networks:
  default:
    name: tientje-ketama-network

volumes:
  postgres_data:
