# Security headers (X-Frame-Options, Referrer-Policy, HSTS, etc.) from platform
# middleware app-headers. CSP is set by the app (SvelteKit kit.csp).
services:
  app:
    environment:
      PUBLIC_SIMPLE_ANALYTICS_DOMAIN: tientjeketama.nl
    networks:
      - default
      - traefik
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.app.rule: "Host(`dev.tientjeketama.nl`) || Host(`prod.tientjeketama.nl`)"
      traefik.http.routers.app.entrypoints: "websecure"
      traefik.http.routers.app.tls.certresolver: "letsencrypt"
      traefik.http.routers.app.middlewares: "app-headers,app-buffering"
      traefik.http.services.app.loadbalancer.server.port: "3000"
  db:
    restart: unless-stopped

networks:
  traefik:
    external: true
